<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F4F4" />
    <title>Arrows</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <!-- Intro / level-select screen -->
      <section class="screen screen--intro" id="screen-intro">
        <div class="intro__brand">
          <h1 class="wordmark" aria-label="Arrows">
            <svg class="wordmark__a" viewBox="0 0 100 100" aria-hidden="true"><polygon points="50,6 96,94 4,94" /></svg><span>rrows</span>
          </h1>
          <div class="intro__level">
            <button class="chev" id="level-prev" type="button" aria-label="Previous level">&#9664;</button>
            <div class="level-counter" id="level-counter"><span class="level-counter__label">Level</span><span class="level-counter__digits" id="level-digits"></span></div>
            <button class="chev" id="level-next" type="button" aria-label="Next level">&#9654;</button>
          </div>
        </div>
        <button class="btn btn--primary" id="btn-play" type="button">Play</button>
      </section>

      <!-- Game screen -->
      <section class="screen screen--game" id="screen-game" hidden>
        <header class="hud" id="hud">
          <div class="hud__left">
            <button class="icon-btn" id="btn-back" type="button" aria-label="Back to menu">
              <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="16,4 16,20 5,12" /></svg>
            </button>
            <button class="icon-btn" id="btn-restart" type="button" aria-label="Restart level">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z" /></svg>
            </button>
          </div>
          <div class="hearts" id="hearts" aria-label="Lives"></div>
        </header>

        <div class="stage" id="stage">
          <svg class="board" id="board" xmlns="http://www.w3.org/2000/svg" aria-label="Puzzle board">
            <g id="layer-dots"></g>
            <g id="layer-arrows"></g>
          </svg>
          <canvas class="confetti" id="confetti" aria-hidden="true"></canvas>
          <div class="praise" id="praise" aria-live="polite"></div>
          <div class="hint" id="hint" hidden>Tap an arrow to move it</div>
        </div>
      </section>

      <div class="wash" id="wash" aria-hidden="true"></div>
      <div class="toast" id="toast" role="status"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
