    <div id="app">
      <!-- Intro / level-select screen -->
      <section class="screen screen--intro" id="screen-intro">
        <div class="intro__brand">

      </section>

        <header class="hud" id="hud">
          <div class="hud__left">

            </button>

            </button>
          </div>
          <div class="hearts" id="hearts" aria-label="Lives"></div>
        </header>

        <div class="stage" id="stage">
          <svg class="board" id="board" xmlns="http://www.w3.org/2000/svg" aria-label="Puzzle board">
            <g id="layer-dots"></g>
            <g id="layer-arrows"></g>
          </svg>
          <canvas class="confetti" id="confetti" aria-hidden="true"></canvas>
          <div class="praise" id="praise" aria-live="polite"></div>
          <div class="hint" id="hint" hidden>Tap an arrow to move it</div>
        </div>
      </section>

      <div class="wash" id="wash" aria-hidden="true"></div>
      <div class="toast" id="toast" role="status"></div>
    </div>
